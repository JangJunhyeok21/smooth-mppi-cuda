cuda_mppi_controller:
  ros__parameters:
    # --- Limits (User Provided) ---
    max_steer: 0.4089        # rad (약 40도)
    min_accel: -9.0      # m/s^2
    max_accel: 9.0       # m/s^2
    min_speed: 0.0        # m/s
    target_speed: 5.0    # m/s
    max_speed: 1.0       # m/s
    
    # --- Costs ---
    q_dist: 0.5
    q_v: 10.0
    q_du: 0.5
    q_collision: 400.0
    collision_radius: 0.3
    
    # --- Noise & Tuning ---
    # 한번에 얼마까지 변화를 줄까
    noise_steer_std: 0.5236  # rad/s
    noise_accel_std: 25.0  # m/s^2
    max_steer_rate: 4.0  # rad/s (약 229도/s)
    max_accel_rate: 1000.0   # m/s^3
    lambda: 15.0
    visualize_candidates: true
    
    # --- Dynamic Model Params ---
    mass: 3.74
    l_f: 0.17
    l_r: 0.17
    I_z: 0.07
    
    # Pacejka Coefficients
    B_f: 1.7
    C_f: 1.5
    D_f: 40.0                      # if mu = 1, 19.0503
    B_r: 1.7
    C_r: 1.5
    D_r: 40.0                      # if mu = 1, 17.6391
    
    velocity_topic: /odom
    drive_topic: /ackermann_cmd
    path_topic: /center_path
    pose_topic: /mcl_pose
    use_mcl_pose: true