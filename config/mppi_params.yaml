cuda_mppi_controller:
  ros__parameters:
    # --- Limits (User Provided) ---
    max_steer: 0.507        # rad (약 29도)
    min_accel: -9.0      # m/s^2
    max_accel: 9.0       # m/s^2
    min_speed: 0.5        # m/s
    target_speed: 7.0    # m/s
    max_speed: 7.0       # m/s
    
    # --- Costs ---
    q_dist: 7.0
    q_v: 0.9
    q_u: 0.03
    q_du: 4.0
    q_heading: 4.0
    q_lat: 7.0
    q_collision: 2.0
    collision_radius: 0.3
    
    # --- Noise & Tuning ---
    noise_steer_std: 0.01
    noise_accel_std: 0.08
    max_steer_rate: 0.06  # steer_vel_max(4.0) * dt(0.02) = 0.08
    max_accel_rate: 1.0   # jerk_max(100.0) * dt(0.02) = 2.0
    lambda: 15.0
    visualize_candidates: true
    
    # --- Dynamic Model Params ---
    mass: 3.5
    l_f: 0.17
    l_r: 0.17
    I_z: 0.07
    
    # Pacejka Coefficients
    B_f: 1.5
    C_f: 1.5
    D_f: 30.0
    
    B_r: 1.5
    C_r: 1.5
    D_r: 30.0
    
    odom_topic: /odom0
    scan_topic: /scan0
    drive_topic: /ackermann_cmd0
    path_topic: /center_path