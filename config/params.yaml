cuda_mppi_controller:
  ros__parameters:
    # 단일 통합 설정 파일
    # - 시뮬레이션/실차 분기는 launch/cuda_mppi.launch.py 의 is_simulation 값으로 처리
    # - 여기 값은 공통 기본값이며 필요 시 launch의 override가 우선 적용됨

    # --- Limits ---
    max_steer: 0.507        # rad
    min_accel: -9.0         # m/s^2
    max_accel: 9.0          # m/s^2
    min_speed: 0.0          # m/s
    target_speed: 5.0       # m/s
    max_speed: 10.0         # m/s
    
    # --- Costs (공통 기본값) ---
    q_dist: 0.0
    q_v: 10.0
    q_du: 1.0
    q_collision: 400.0
    collision_radius: 0.27
    
    # --- Noise & Tuning ---
    noise_steer_std: 0.5  # rad/s
    noise_accel_std: 3.0  # m/s^2
    max_steer_rate: 4.0   # rad/s
    max_accel_rate: 1000.0   # m/s^3
    lambda: 15.0
    visualize_candidates: true
    
    # --- Dynamic Model Params ---
    mass: 3.5
    l_f: 0.17
    l_r: 0.17
    I_z: 0.07
    
    # Pacejka Coefficients
    B_f: 1.5
    C_f: 1.5
    D_f: 15.0
    
    B_r: 1.5
    C_r: 1.5
    D_r: 15.0

    # --- Topics (공통 키, launch에서 환경별 override) ---
    odom_topic: /odom0
    pose_topic: /mcl_pose
    velocity_topic: /odom
    drive_topic: /ackermann_cmd0
    path_topic: /center_path
    use_mcl_pose: false